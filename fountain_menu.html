<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Fountain – Menu Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #B8933F;
  --gold-light: #E8D5A3;
  --gold-dark: #7A5C1E;
  --charcoal: #3A3835;
  --charcoal-light: #5A5754;
  --cream: #FAF7F2;
  --cream-dark: #F0EBE1;
  --white: #FFFFFF;
  --border: rgba(184,147,63,0.25);
  --border-strong: rgba(184,147,63,0.5);
  --text: #2C2A27;
  --text-muted: #7A7670;
  --success: #3B6D11;
  --success-bg: #EAF3DE;
  --error: #A32D2D;
  --error-bg: #FCEBEB;
  --warn-bg: #FAEEDA;
  --warn: #854F0B;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.header {
  background: var(--charcoal);
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-light);
  letter-spacing: 0.08em;
}
.logo span { font-style: italic; font-size: 13px; display: block; letter-spacing: 0.15em; color: var(--gold); }
.user-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 0.5px solid var(--border-strong);
  border-radius: 20px;
  padding: 6px 12px 6px 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.user-badge:active { background: rgba(255,255,255,0.14); }
.avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--charcoal);
}
.user-name { font-size: 13px; color: var(--gold-light); }

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── ONBOARDING ── */
.onboard-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: var(--charcoal);
}
.onboard-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  color: var(--gold-light);
  text-align: center;
  line-height: 1;
  margin-bottom: 4px;
}
.onboard-logo em { font-style: italic; font-size: 18px; display: block; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 24px; }
.onboard-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 40px;
  line-height: 1.6;
}
.name-input-wrap { width: 100%; max-width: 320px; }
.name-input-label { font-size: 12px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
.name-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border 0.15s;
  -webkit-appearance: none;
}
.name-input:focus { border-color: var(--gold); }
.name-input::placeholder { color: rgba(255,255,255,0.3); }

.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--gold);
  color: var(--charcoal);
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 12px;
  letter-spacing: 0.03em;
  transition: background 0.15s, transform 0.1s;
}
.btn-primary:active { background: var(--gold-dark); transform: scale(0.98); }

.existing-users { margin-top: 32px; width: 100%; max-width: 320px; }
.existing-label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin-bottom: 10px; text-transform: uppercase; }
.user-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 7px 12px;
  margin: 4px 4px 4px 0;
  cursor: pointer;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  transition: background 0.15s;
}
.user-pill:active { background: rgba(255,255,255,0.12); }
.user-pill .av-sm {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: var(--charcoal);
}

/* ── PKG TABS ── */
.pkg-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.pkg-tab {
  flex: 1;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.pkg-tab .tab-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--text-muted);
  display: block;
  font-weight: 600;
}
.pkg-tab .tab-name { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
.pkg-tab.active { border-bottom-color: var(--gold); }
.pkg-tab.active .tab-price { color: var(--gold-dark); }
.pkg-tab.active .tab-name { color: var(--gold); }

/* ── PROGRESS BAR ── */
.progress-strip {
  background: var(--cream-dark);
  padding: 10px 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.progress-strip::-webkit-scrollbar { display: none; }
.prog-chip {
  flex-shrink: 0;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  background: white;
  color: var(--text-muted);
  white-space: nowrap;
}
.prog-chip.done { background: var(--success-bg); color: var(--success); border-color: #C0DD97; }
.prog-chip.partial { background: var(--warn-bg); color: var(--warn); border-color: #FAC775; }

/* ── SECTION CARDS ── */
.sections-wrap { padding: 12px 12px 100px; }
.section-card {
  background: var(--white);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.section-head-left { display: flex; align-items: center; gap: 10px; }
.section-label { font-size: 14px; font-weight: 500; color: var(--text); }
.section-quota-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--cream-dark);
  color: var(--text-muted);
}
.section-quota-badge.done { background: var(--success-bg); color: var(--success); }
.section-quota-badge.partial { background: var(--warn-bg); color: var(--warn); }
.chevron { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
.section-card.open .chevron { transform: rotate(180deg); }

.section-voters { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 4px; }
.voter-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  color: var(--text-muted);
  background: var(--cream);
}

.section-body { display: none; border-top: 0.5px solid var(--border); }
.section-card.open .section-body { display: block; }

.sub-label {
  padding: 10px 16px 4px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.choice-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  border-top: 0.5px solid var(--cream-dark);
  cursor: pointer;
  transition: background 0.1s;
  gap: 12px;
}
.choice-row:active { background: var(--cream); }
.choice-row.selected { background: #FDFBF5; }
.choice-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.choice-row.selected .choice-check {
  background: var(--gold);
  border-color: var(--gold);
}
.check-mark { display: none; width: 10px; height: 7px; }
.check-mark path { stroke: white; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.choice-row.selected .check-mark { display: block; }

.choice-info { flex: 1; }
.choice-name { font-size: 14px; color: var(--text); line-height: 1.3; }
.choice-voters { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.choice-voter-av {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 500;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--charcoal);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  z-index: 50;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.btn-save {
  flex: 1;
  padding: 14px;
  background: var(--gold);
  color: var(--charcoal);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-export {
  padding: 14px 18px;
  background: rgba(255,255,255,0.07);
  color: var(--gold-light);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-export:active { background: rgba(255,255,255,0.13); }

/* ── SUMMARY SCREEN ── */
.summary-screen { padding: 16px 12px 80px; }
.summary-header { padding: 0 4px 16px; }
.summary-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--charcoal); }
.summary-header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.voter-section { margin-bottom: 20px; }
.voter-section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding: 0 4px;
}
.voter-av-lg {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500;
}
.voter-name-info h3 { font-size: 15px; font-weight: 500; color: var(--text); }
.voter-name-info p { font-size: 12px; color: var(--text-muted); }

.summary-pkg-card {
  background: white;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}
.summary-pkg-head {
  padding: 12px 16px;
  background: var(--charcoal);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.summary-pkg-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--gold-light); }
.summary-pkg-price { font-size: 12px; color: var(--gold); }
.summary-cat { border-top: 0.5px solid var(--cream-dark); }
.summary-cat-head {
  padding: 10px 16px 4px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.summary-item { padding: 6px 16px; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.summary-item::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--charcoal);
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--charcoal);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  padding: 20px;
  overflow-y: auto;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-light);
  margin-bottom: 4px;
}
.modal-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.modal-text {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  white-space: pre-wrap;
  line-height: 1.6;
  margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  max-height: 40vh;
  overflow-y: auto;
  word-break: break-word;
}
.modal-btns { display: flex; gap: 10px; }
.btn-copy {
  flex: 1;
  padding: 14px;
  background: var(--gold);
  color: var(--charcoal);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-close-modal {
  padding: 14px 20px;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.6);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  display: flex;
  background: var(--charcoal);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.nav-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
}
.nav-tab .nav-icon { font-size: 18px; display: block; }
.nav-tab .nav-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.05em; margin-top: 2px; display: block; text-transform: uppercase; }
.nav-tab.active .nav-label { color: var(--gold); }

.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
}
</style>
</head>
<body>

<!-- ONBOARDING SCREEN -->
<div id="screen-onboard" class="screen active">
  <div class="onboard-wrap">
    <div class="onboard-logo">The Fountain<em>Restaurant · Banquet · Party Lawn</em></div>
    <p class="onboard-sub">Plan your menu together.<br>Pick dishes, see who chose what, export to WhatsApp.</p>
    <div class="name-input-wrap">
      <label class="name-input-label" for="nameInput">Your name</label>
      <input type="text" id="nameInput" class="name-input" placeholder="e.g. Parth" autocomplete="off" autocorrect="off" />
      <button class="btn-primary" onclick="startSession()">Continue</button>
    </div>
    <div class="existing-users" id="existingUsers" style="display:none">
      <div class="existing-label">Or continue as</div>
      <div id="userPills"></div>
    </div>
  </div>
</div>

<!-- MAIN APP SCREEN -->
<div id="screen-main" class="screen">
  <div class="header">
    <div class="header-top">
      <div class="logo">The Fountain<span>Menu Planner</span></div>
      <div class="user-badge" onclick="changeUser()">
        <div class="avatar" id="headerAvatar"></div>
        <span class="user-name" id="headerName"></span>
      </div>
    </div>
  </div>

  <!-- BUILD TAB -->
  <div id="tab-build" class="tab-content">
    <div class="pkg-tabs">
      <button class="pkg-tab active" id="ptab-790" onclick="switchPkg('790')">
        <span class="tab-price">₹790</span>
        <span class="tab-name">Package Two</span>
      </button>
      <button class="pkg-tab" id="ptab-890" onclick="switchPkg('890')">
        <span class="tab-price">₹890</span>
        <span class="tab-name">Package Three</span>
      </button>
    </div>
    <div class="progress-strip" id="progressStrip"></div>
    <div class="sections-wrap" id="sectionsWrap"></div>
  </div>

  <!-- SUMMARY TAB -->
  <div id="tab-summary" class="tab-content" style="display:none">
    <div class="summary-screen" id="summaryContent"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="bottom-bar" id="buildBar">
      <button class="btn-save" id="saveBtn" onclick="saveSelections()">Save my picks</button>
      <button class="btn-export" onclick="showExport()">Export ↗</button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="navBuild" onclick="showTab('build')">
        <span class="nav-icon">✦</span>
        <span class="nav-label">Build</span>
      </button>
      <button class="nav-tab" id="navSummary" onclick="showTab('summary')">
        <span class="nav-icon">◈</span>
        <span class="nav-label">All picks</span>
      </button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal-sheet">
    <div class="modal-title">Export to WhatsApp</div>
    <div class="modal-sub">Copy and paste into your group chat</div>
    <div class="modal-text" id="exportText"></div>
    <div class="modal-btns">
      <button class="btn-copy" onclick="copyExport()">Copy text</button>
      <button class="btn-close-modal" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

// ─── STATE ──────────────────────────────────────────────────────
let state = { users: {}, selections: {} };
// selections[userId][pkg][sectionIdx] = [items]
let currentUser = null;
let currentPkg = '790';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getUserColor(userId) {
  const users = Object.keys(state.users);
  const idx = users.indexOf(userId);
  return USER_COLORS[idx % USER_COLORS.length];
}
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ─── ONBOARDING ─────────────────────────────────────────────────
loadState();

function showOnboard() {
  document.getElementById('screen-onboard').classList.add('active');
  document.getElementById('screen-main').classList.remove('active');
  const existingIds = Object.keys(state.users);
  const euWrap = document.getElementById('existingUsers');
  const pillsEl = document.getElementById('userPills');
  if (existingIds.length > 0) {
    euWrap.style.display = '';
    pillsEl.innerHTML = existingIds.map(uid => {
      const u = state.users[uid];
      const col = getUserColor(uid);
      return `<span class="user-pill" onclick="loginAs('${uid}')"><span class="av-sm" style="background:${col};color:white">${initials(u.name)}</span>${u.name}</span>`;
    }).join('');
  } else {
    euWrap.style.display = 'none';
  }
  document.getElementById('nameInput').focus();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSession();
});

function startSession() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const uid = 'u_' + name.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now().toString(36).slice(-4);
  state.users[uid] = { name, createdAt: Date.now() };
  saveState();
  enterApp(uid);
}

function loginAs(uid) {
  enterApp(uid);
}

function changeUser() {
  document.getElementById('nameInput').value = '';
  showOnboard();
}

function enterApp(uid) {
  currentUser = uid;
  if (!state.selections[uid]) state.selections[uid] = {};
  const u = state.users[uid];
  const col = getUserColor(uid);
  document.getElementById('headerAvatar').style.background = col;
  document.getElementById('headerAvatar').textContent = initials(u.name);
  document.getElementById('headerName').textContent = u.name;
  document.getElementById('screen-onboard').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  renderBuild();
}

// ─── PKG / TAB SWITCHING ────────────────────────────────────────
function switchPkg(pkg) {
  currentPkg = pkg;
  document.getElementById('ptab-790').className = 'pkg-tab' + (pkg==='790'?' active':'');
  document.getElementById('ptab-890').className = 'pkg-tab' + (pkg==='890'?' active':'');
  renderBuild();
}

function showTab(tab) {
  document.getElementById('tab-build').style.display = tab==='build' ? '' : 'none';
  document.getElementById('tab-summary').style.display = tab==='summary' ? '' : 'none';
  document.getElementById('buildBar').style.display = tab==='build' ? '' : 'none';
  document.getElementById('navBuild').className = 'nav-tab' + (tab==='build'?' active':'');
  document.getElementById('navSummary').className = 'nav-tab' + (tab==='summary'?' active':'');
  if (tab === 'summary') renderSummary();
}

// ─── MY SELECTIONS (per user, per pkg) ──────────────────────────
function mySelKey(pkg, idx) { return `${pkg}_${idx}`; }

function getMySel(pkg, idx) {
  const s = state.selections[currentUser];
  return s[mySelKey(pkg, idx)] || [];
}

function setMySel(pkg, idx, arr) {
  if (!state.selections[currentUser]) state.selections[currentUser] = {};
  state.selections[currentUser][mySelKey(pkg, idx)] = arr;
}

// ─── RENDER BUILD ───────────────────────────────────────────────
function renderBuild() {
  const pkg = currentPkg;
  const secs = packages[pkg];
  const wrap = document.getElementById('sectionsWrap');

  // Progress strip
  const strip = document.getElementById('progressStrip');
  strip.innerHTML = secs.map((sec, idx) => {
    const label = sec.label || menuData[sec.key].label;
    const sel = getMySel(pkg, idx);
    const count = sel.length;
    const cls = count === sec.quota ? 'done' : count > 0 ? 'partial' : '';
    return `<span class="prog-chip ${cls}">${label}: ${count}/${sec.quota}</span>`;
  }).join('');

  // Section cards
  wrap.innerHTML = secs.map((sec, idx) => {
    const mdata = menuData[sec.key];
    const label = sec.label || mdata.label;
    const sel = getMySel(pkg, idx);
    const count = sel.length;
    const quotaCls = count === sec.quota ? 'done' : count > 0 ? 'partial' : '';

    // Who else picked in this section
    const voterNames = getVotersForSection(pkg, idx);
    const voterHtml = voterNames.length > 0
      ? `<div class="section-voters">${voterNames.map(v=>`<span class="voter-tag">${v}</span>`).join('')}</div>`
      : '';

    // Body choices
    const subsHtml = Object.entries(mdata.subs).map(([subName, items]) => {
      const subLabel = Object.keys(mdata.subs).length > 1
        ? `<div class="sub-label">${subName}</div>` : '';
      const itemsHtml = items.map(item => {
        const isSel = sel.includes(item);
        const voters = getVotersForItem(pkg, idx, item);
        const voterAvatars = voters.map(v => {
          const col = getUserColor(v.uid);
          return `<span class="choice-voter-av" style="background:${col};color:white;font-size:8px;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">${initials(v.name)}</span>`;
        }).join('');
        return `<div class="choice-row${isSel?' selected':''}" onclick="toggleItem(${idx},'${escQ(item)}',${sec.quota})">
          <div class="choice-check">
            <svg class="check-mark" viewBox="0 0 10 7"><path d="M1 3.5L3.5 6L9 1"/></svg>
          </div>
          <div class="choice-info">
            <div class="choice-name">${item}</div>
            ${voters.length > 0 ? `<div class="choice-voters">${voterAvatars}</div>` : ''}
          </div>
        </div>`;
      }).join('');
      return subLabel + itemsHtml;
    }).join('');

    return `<div class="section-card" id="card_${pkg}_${idx}">
      <div class="section-head" onclick="toggleCard(${idx})">
        <div class="section-head-left">
          <span class="section-label">${label}</span>
          <span class="section-quota-badge ${quotaCls}" id="badge_${pkg}_${idx}">${count}/${sec.quota}</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      ${voterHtml}
      <div class="section-body">${subsHtml}</div>
    </div>`;
  }).join('');
}

function escQ(s) { return s.replace(/'/g, "\\'"); }

function toggleCard(idx) {
  const card = document.getElementById(`card_${currentPkg}_${idx}`);
  card.classList.toggle('open');
}

function toggleItem(idx, item, quota) {
  const pkg = currentPkg;
  let sel = [...getMySel(pkg, idx)];
  const pos = sel.indexOf(item);
  if (pos >= 0) {
    sel.splice(pos, 1);
  } else {
    if (sel.length >= quota) sel.shift();
    sel.push(item);
  }
  setMySel(pkg, idx, sel);
  updateSection(idx);
}

function updateSection(idx) {
  const pkg = currentPkg;
  const secs = packages[pkg];
  const sec = secs[idx];
  const sel = getMySel(pkg, idx);
  const count = sel.length;
  const quotaCls = count === sec.quota ? 'done' : count > 0 ? 'partial' : '';

  // Update badge
  const badge = document.getElementById(`badge_${pkg}_${idx}`);
  if (badge) { badge.textContent = `${count}/${sec.quota}`; badge.className = `section-quota-badge ${quotaCls}`; }

  // Update progress strip
  const chips = document.getElementById('progressStrip').children;
  if (chips[idx]) {
    const label = sec.label || menuData[sec.key].label;
    chips[idx].textContent = `${label}: ${count}/${sec.quota}`;
    chips[idx].className = `prog-chip ${quotaCls}`;
  }

  // Re-render choice rows inside the open card
  const card = document.getElementById(`card_${pkg}_${idx}`);
  if (card && card.classList.contains('open')) {
    const body = card.querySelector('.section-body');
    const mdata = menuData[sec.key];
    body.innerHTML = Object.entries(mdata.subs).map(([subName, items]) => {
      const subLabel = Object.keys(mdata.subs).length > 1 ? `<div class="sub-label">${subName}</div>` : '';
      const itemsHtml = items.map(item => {
        const isSel = sel.includes(item);
        const voters = getVotersForItem(pkg, idx, item);
        const voterAvatars = voters.map(v => {
          const col = getUserColor(v.uid);
          return `<span class="choice-voter-av" style="background:${col};color:white;font-size:8px;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">${initials(v.name)}</span>`;
        }).join('');
        return `<div class="choice-row${isSel?' selected':''}" onclick="toggleItem(${idx},'${escQ(item)}',${sec.quota})">
          <div class="choice-check">
            <svg class="check-mark" viewBox="0 0 10 7"><path d="M1 3.5L3.5 6L9 1"/></svg>
          </div>
          <div class="choice-info">
            <div class="choice-name">${item}</div>
            ${voters.length > 0 ? `<div class="choice-voters">${voterAvatars}</div>` : ''}
          </div>
        </div>`;
      }).join('');
      return subLabel + itemsHtml;
    }).join('');
  }
}

// ─── VOTER HELPERS ───────────────────────────────────────────────
function getVotersForSection(pkg, idx) {
  return Object.entries(state.selections)
    .filter(([uid]) => uid !== currentUser && state.users[uid])
    .filter(([uid, usels]) => {
      const items = usels[mySelKey(pkg, idx)] || [];
      return items.length > 0;
    })
    .map(([uid]) => state.users[uid].name);
}

function getVotersForItem(pkg, idx, item) {
  return Object.entries(state.selections)
    .filter(([uid]) => state.users[uid])
    .filter(([uid, usels]) => {
      const items = usels[mySelKey(pkg, idx)] || [];
      return items.includes(item);
    })
    .map(([uid]) => ({ uid, name: state.users[uid].name }));
}

function saveSelections() {
  saveState();
  showToast('Picks saved!');
  renderBuild();
}

// ─── SUMMARY ─────────────────────────────────────────────────────
function renderSummary() {
  const wrap = document.getElementById('summaryContent');
  const userIds = Object.keys(state.users);
  if (userIds.length === 0) { wrap.innerHTML = '<p style="padding:24px;color:var(--text-muted)">No one has saved picks yet.</p>'; return; }

  let html = '<div style="padding:16px 4px 8px"><h2 style="font-family:Cormorant Garamond,serif;font-size:24px;color:var(--charcoal)">All picks</h2><p style="font-size:13px;color:var(--text-muted);margin-top:2px">See who chose what across both packages</p></div>';

  // Per-user cards
  userIds.forEach(uid => {
    const u = state.users[uid];
    const col = getUserColor(uid);
    const isMe = uid === currentUser;
    html += `<div style="margin-bottom:24px">`;
    html += `<div style="display:flex;align-items:center;gap:10px;padding:0 4px;margin-bottom:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:${col};color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0">${initials(u.name)}</div>
      <div><div style="font-size:15px;font-weight:500;color:var(--text)">${u.name}${isMe?' (you)':''}</div>
      <div style="font-size:12px;color:var(--text-muted)">Saved picks</div></div>
    </div>`;

    ['790','890'].forEach(pkg => {
      const secs = packages[pkg];
      const hasPicks = secs.some((sec, idx) => (state.selections[uid]?.[mySelKey(pkg,idx)]||[]).length > 0);
      if (!hasPicks) return;
      html += `<div class="summary-pkg-card" style="margin-bottom:8px">`;
      html += `<div class="summary-pkg-head"><span class="summary-pkg-name">Package ${pkg==='790'?'Two':'Three'}</span><span class="summary-pkg-price">₹${pkg}/person + GST</span></div>`;
      secs.forEach((sec, idx) => {
        const items = state.selections[uid]?.[mySelKey(pkg, idx)] || [];
        if (items.length === 0) return;
        const label = sec.label || menuData[sec.key].label;
        html += `<div class="summary-cat">`;
        html += `<div class="summary-cat-head">${label} (${items.length}/${sec.quota})</div>`;
        items.forEach(item => {
          html += `<div class="summary-item">${item}</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });

  // Overlap section
  html += renderOverlap();
  wrap.innerHTML = html;
}

function renderOverlap() {
  const userIds = Object.keys(state.users);
  if (userIds.length < 2) return '';
  let html = `<div style="margin-bottom:24px"><div style="padding:0 4px;margin-bottom:12px"><h3 style="font-size:16px;font-weight:500;color:var(--charcoal)">Common picks</h3><p style="font-size:12px;color:var(--text-muted);margin-top:2px">Items chosen by 2 or more people</p></div>`;

  ['790','890'].forEach(pkg => {
    const secs = packages[pkg];
    let pkgHtml = '';
    secs.forEach((sec, idx) => {
      const allItems = {};
      userIds.forEach(uid => {
        (state.selections[uid]?.[mySelKey(pkg, idx)] || []).forEach(item => {
          if (!allItems[item]) allItems[item] = [];
          allItems[item].push(uid);
        });
      });
      const shared = Object.entries(allItems).filter(([,uids]) => uids.length >= 2);
      if (shared.length === 0) return;
      const label = sec.label || menuData[sec.key].label;
      pkgHtml += `<div class="summary-cat"><div class="summary-cat-head">${label}</div>`;
      shared.forEach(([item, uids]) => {
        const names = uids.map(uid => state.users[uid]?.name||'?').join(', ');
        pkgHtml += `<div class="summary-item" style="flex-direction:column;align-items:flex-start;gap:2px">
          <span>${item}</span>
          <span style="font-size:11px;color:var(--text-muted)">${names}</span>
        </div>`;
      });
      pkgHtml += `</div>`;
    });
    if (!pkgHtml) return;
    html += `<div class="summary-pkg-card" style="margin-bottom:8px">`;
    html += `<div class="summary-pkg-head"><span class="summary-pkg-name">Package ${pkg==='790'?'Two':'Three'}</span><span class="summary-pkg-price">₹${pkg}/person + GST</span></div>`;
    html += pkgHtml;
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// ─── EXPORT ──────────────────────────────────────────────────────
function buildWhatsAppText() {
  const u = state.users[currentUser];
  let lines = [];
  lines.push(`🍽️ *The Fountain – Menu Picks*`);
  lines.push(`👤 ${u.name}`);
  lines.push(`📅 ${new Date().toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'})}`);
  lines.push('');

  ['790','890'].forEach(pkg => {
    const secs = packages[pkg];
    const hasPicks = secs.some((sec, idx) => getMySel(pkg, idx).length > 0);
    if (!hasPicks) return;
    lines.push(`━━━━━━━━━━━━━━━━━━`);
    lines.push(`*Package ${pkg==='790'?'Two':'Three'} – ₹${pkg}/person + GST*`);
    lines.push('');
    secs.forEach((sec, idx) => {
      const items = getMySel(pkg, idx);
      if (items.length === 0) return;
      const label = sec.label || menuData[sec.key].label;
      lines.push(`*${label}* (${items.length}/${sec.quota})`);
      items.forEach(item => lines.push(`  • ${item}`));
      lines.push('');
    });
  });

  lines.push(`━━━━━━━━━━━━━━━━━━`);
  lines.push(`📍 Opp. Hillock Hotel, New Chandkheda, Ahmedabad`);
  lines.push(`📞 Restaurant: +91 7861895107`);
  return lines.join('\n');
}

function showExport() {
  const text = buildWhatsAppText();
  document.getElementById('exportText').textContent = text;
  document.getElementById('exportModal').classList.add('open');
}

function copyExport() {
  const text = document.getElementById('exportText').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      closeModal();
      showToast('Copied! Paste into WhatsApp ✓');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    closeModal();
    showToast('Copied! Paste into WhatsApp ✓');
  }
}

function closeModal() {
  document.getElementById('exportModal').classList.remove('open');
}

// Close modal on backdrop click
document.getElementById('exportModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ────────────────────────────────────────────────────────
showOnboard();
</script>
